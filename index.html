<body data-page="home">
  <a class="skip-link" href="#main-content">Aller au contenu</a>

  <!-- CADRE GLOBAL (editorial luxe) -->

    <div data-header-component data-header-source="./partals/header.html">

        <div class="container header-inner">
          <a href="./index.html" class="brand">Léa&nbsp;&amp;&nbsp;Vincent</a>
        </div>

    </div>

    <main id="main-content">
    <!-- HERO VIDEO (auto-hébergée) -->

      <video autoplay muted playsinline loop preload="metadata" poster="./media/hero-poster.png" aria-label="Vidéo d'accueil du mariage">

          <div id="countdown" aria-live="polite"></div>

          <div class="cta">

            <a class="btn btn-outline" href="#programme">Découvrir le week-end</a>
          </div>
        </div>
      </div>

    <!-- PROGRAMME -->
<section id="programme" class="section-alt-1">

      <div class="card rsvp-loading">Chargement du programme...</div>
    </div>
  </div>
</section>

    <!-- RSVP -->
    <section id="rsvp" class="section-plum-2">
      <div class="container rsvp-shell">
        <div data-rsvp-component data-rsvp-source="./partals/rsvp-module.html">
          <div class="card rsvp-loading">Chargement du formulaire...</div>
        </div>
      </div>
    </section>

    <div data-footer-component data-footer-source="./partals/footer.html">

    </main>

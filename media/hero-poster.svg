<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Mariage de Léa et Vincent</title>
  <desc id="desc">Poster doux et lumineux pour la vidéo d'accueil du site de mariage.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8E7277"/>
      <stop offset="45%" stop-color="#7A5A5F"/>
      <stop offset="100%" stop-color="#5F474B"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="42%">
      <stop offset="0%" stop-color="rgba(255,250,245,0.55)"/>
      <stop offset="48%" stop-color="rgba(255,250,245,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,250,245,0)"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#glow)"/>
  <ellipse cx="800" cy="410" rx="420" ry="285" fill="rgba(255,250,245,0.08)"/>
</svg>
